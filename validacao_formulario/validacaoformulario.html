<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Validação de Formulário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <style>
        * {
            margin: 12px;
        }
    </style>
    <br>
    <h1>Cadastro de Endereço</h1>

    <main>
        <div>
            <form class="row g-3">
                <div>
                    <label>Nome completo*</label>
                    <input type="text" class="form-control" aria-label="Digite seu nome" required>
                </div>

                <div>
                    <label>CPF*</label>
                    <input type="text" class="form-control" id="cpf" aria-label="Digite o CPF" maxlength="14" oninput="this.value = this.value
                    .replace(/\D/g, '')
                    .replace(/(\d{3})(\d)/,'$1.$2')
                    .replace(/(\d{3})(\d)/,'$1.$2')
                    .replace(/(\d{3})(\d)/,'$1-$2')
                   
                    let msg = document.getElementById('CPFinvalido')
                    if(this.value.length < 14){
                        msg.style.display = 'block';
                    }
                    else{
                        msg.style.display = 'none';
                    }" required>

                    <small id="CPFinvalido" style="color: red; display: none;">
                        CPF Inválido!
                    </small>
                </div>

                <div>
                    <label for="validationDefault05">CEP*</label>
                    <input type="text" class="form-control" id="cep" maxlength="9" oninput="this.value = this.value.replace(/\D/g, '')
                    .replace(/(\d{5})(\d)/, '$1-$2')
                   
                    let msg2 = document.getElementById('CEPinvalido')
                    if(this.value.length < 9){
                        msg2.style.display = 'block';
                    }
                    else{
                        msg2.style.display = 'none';
                    }" required>

                    <small id="CEPinvalido" style="color: red; display: none;">
                        CEP Inválido!
                    </small>

                </div>

                <div>
                    <label class="form-label">Endereço*</label>
                    <input type="text" class="form-control" placeholder="Ex: Rua 00 - João Dias, 000 Bairro Tal"
                        id="endereco" required>
                </div>

                <div>
                    <label>Rua*</label>
                    <input type="text" class="form-control" id="rua" placeholder="Ex: Rua 00 - João Dias" required>
                </div>

                <div>
                    <label>Nº da residência</label>
                    <input type="text" class="form-control" id="nº" placeholder="Ex: 000">
                </div>

                <div>
                    <label>Bairro*</label>
                    <input type="text" class="form-control" id="bairro" placeholder="Ex: Bairro Tal" required>
                </div>

                <div>
                    <label>Complemento</label>
                    <input type="text" class="form-control" placeholder="Ex: Ao lado do hospital">
                </div>

                <div>
                    <label for="validationDefault03" class="form-label">Cidade*</label>
                    <input type="text" class="form-control" id="cidade" required>
                </div>

                <div>
                    <label for="validationDefault04" class="form-label">Estado*</label>
                    <select class="form-select" id="estado" required>
                        <option selected disabled value="">Escolha...</option>
                        <option value="ACRE">Acre</option>
                        <option value="ALAGOAS">Alagoas</option>
                        <option value="AMAPA">Amapá</option>
                        <option value="AMAZONAS">Amazonas</option>
                        <option value="BAHIA">Bahia</option>
                        <option value="CEARÁ">Ceará</option>
                        <option value="DISTRITO FEDERAL">Distrito Federal</option>
                        <option value="ESPÍRITO SANTO">Espírito Santo</option>
                        <option value="GOIÁS">Goiás</option>
                        <option value="MARANHÃO">Maranhão</option>
                        <option value="MATO GROSSO">Mato Grosso</option>
                        <option value="MATO GROSSO DO SUL">Mato Grosso do Sul</option>
                        <option value="MINAS GERAIS">Minas Gerais</option>
                        <option value="PARÁ">Pará</option>
                        <option value="PARAÍBA">Paraíba</option>
                        <option value="PARANÁ">Paraná</option>
                        <option value="PERNAMBUCO">Pernambuco</option>
                        <option value="PIAUÍ">Piauí</option>
                        <option value="RIO DE JANEIRO">Rio de Janeiro</option>
                        <option value="RIO GRANDE DO NORTE">Rio Grande do Norte</option>
                        <option value="RIO GRANDE DO SUL">Rio Grande do Sul</option>
                        <option value="RONDÔNIA">Rondônia</option>
                        <option value="RORAIMA">Roraima</option>
                        <option value="SANTA CATARINA">Santa Catarina</option>
                        <option value="SÃO PAULO">São Paulo</option>
                        <option value="SERGIPE">Sergipe</option>
                        <option value="TOCANTINS">Tocantins</option>
                    </select>
                </div>



                <div>
                    <button class=" btn btn-primary" type="submit">Enviar</button>
                </div>
            </form>
        </div>
    </main>

    <div>
        <h6 style="padding: 10px;">CEP Pré Definidos:</h6>
        <div style="padding: 10px;">
            <p>69010-000</p>
            <p>40026-280</p>
            <p>70160-900</p>
            <p>80240-000</p>
            <p>60060-170</p>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>

    <script>
        const enderecos = [
            {
                "CEP": "69010-000",
                "Endereço": "Centro Histórico",
                "Rua": "Sete de Setembro",
                "Cidade": "Manaus",
                "Estado": "Amazonas"
            },
            {
                "CEP": "40026-280",
                "Endereço": "Pelourinho",
                "Rua": "Terreiro de Jesus",
                "Cidade": "Salvador",
                "Estado": "Bahia"
            },
            {
                "CEP": "70160-900",
                "Endereço": "Praça dos Três Poderes",
                "Rua": "Eixo Monumental",
                "Cidade": "Brasília",
                "Estado": "Distrito Federal",
                "Número": "1"
            },
            {
                "CEP": "80240-000",
                "Endereço": "Batel",
                "Rua": "Avenida Sete de Setembro",
                "Cidade": "Curitiba",
                "Estado": "Paraná",
                "Número": "4500"
            },
            {
                "CEP": "60060-170",
                "Endereço": "Praia de Iracema",
                "Rua": "Rua dos Tabajaras",
                "Cidade": "Fortaleza",
                "Estado": "Ceará"
            }
        ]




        // GUARDA O INPUT DO CEP NUMA VARIAVEL 
        const inputCEP = document.getElementById("cep");
        // AO DIGITAR NO INPUT CEP, A FUNÇÃO "buscarCEP" SERÁ CHAMADA
        inputCEP.addEventListener("input", buscarCEP);

        /* SERVIRÁ PARA APAGAR TUDO DOS CAMPOS ESPECIFICOS QUANDO O
        CEP FOR INVÁLIDO OU NÃO EXISTIR*/
        function limparCampo() {
            document.getElementById("endereco").value = "";
            document.getElementById("rua").value = "";
            document.getElementById("cidade").value = "";
            document.getElementById("estado").value = "";
            document.getElementById("nº").value = "";
        }

        function buscarCEP() {
            //GUARDA O CEP QUE FOI DIGITADO NA VARIAVEL "cepDigitado"
            const cepDigitado = inputCEP.value;
            // PROCURA O CEP NA LISTA DE CEP E COMPARA PARA VER SE É IGUAL AO QUE FOI DIGITADO
            const resultado = enderecos.find(e => e.CEP === cepDigitado);

            if (!resultado) {
                limparCampo();
                return;
            }

            document.getElementById("endereco").value = resultado["Endereço"];
            document.getElementById("rua").value = resultado["Rua"];
            document.getElementById("cidade").value = resultado["Cidade"];
            document.getElementById("estado").value = resultado["Estado"];
            document.getElementById("nº").value = resultado["Número"];
        }

    </script>

</body>

</html>
